<!doctype html>
<html lang="zh-CN" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Nan Peng You Hotpot | 网站暂未开放</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d0709;
        --card: rgba(24, 16, 19, 0.92);
        --text: #f6ecdf;
        --muted: #d0c3b0;
        --primary: #d26464;
        --border: rgba(185, 28, 28, 0.22);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(117, 2, 15, 0.22), transparent 32%),
          radial-gradient(circle at bottom, rgba(201, 175, 147, 0.06), transparent 28%),
          linear-gradient(180deg, #170d10 0%, var(--bg) 100%);
      }

      .card {
        width: 100%;
        max-width: 560px;
        border: 1px solid var(--border);
        border-radius: 28px;
        padding: 32px;
        background: var(--card);
        box-shadow: 0 30px 80px -36px rgba(0, 0, 0, 0.75);
      }

      .eyebrow {
        margin: 0;
        color: #eaa7a7;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      h1 {
        margin: 16px 0 0;
        font-size: 36px;
        line-height: 1.15;
      }

      p {
        margin: 16px 0 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .hint {
        margin-top: 24px;
        padding-top: 18px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">Nan Peng You Hotpot</p>
      <h1>网站暂未开放</h1>
      <p>我们正在进行最后确认与内容整理，公开入口会在准备完成后正式开放。</p>
      <p>如果你是内部成员或测试人员，请使用专属预览链接访问当前版本。</p>
      <p class="hint">Public opening is temporarily disabled. Please check back soon.</p>
    </main>
  </body>
  </html>
